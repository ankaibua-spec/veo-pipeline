name: Build Tauri

on:
  push:
    branches: [main]
    paths:
      - 'tauri/**'
      - '.github/workflows/tauri.yml'
    tags: ['t*']
  workflow_dispatch:

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install npm deps
        working-directory: tauri
        run: npm install

      - name: Build Tauri (NSIS installer)
        working-directory: tauri
        run: npm run tauri:build

      - name: List output
        run: |
          dir tauri\src-tauri\target\release\bundle\nsis
          dir tauri\src-tauri\target\release\bundle\msi 2>$null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VEO_Pipeline_Pro_Tauri_Windows
          path: |
            tauri/src-tauri/target/release/bundle/nsis/*.exe
            tauri/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/t')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri/src-tauri/target/release/bundle/nsis/*.exe
            tauri/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true

      - name: Notify Telegram
        if: always()
        env:
          TG_BOT: ${{ secrets.VEO_TG_BOT }}
          TG_CHAT: ${{ secrets.VEO_TG_CHAT }}
          JOB_STATUS: ${{ job.status }}
        shell: pwsh
        run: |
          $status = if ($env:JOB_STATUS -eq 'success') { "✅" } else { "❌" }
          $sha = $env:GITHUB_SHA.Substring(0,8)
          $url = "https://github.com/${env:GITHUB_REPOSITORY}/actions/runs/${env:GITHUB_RUN_ID}"
          $msg = "${status} <b>Tauri build</b>%0Acommit ${sha}%0A${url}"
          if ($env:TG_BOT -and $env:TG_CHAT) {
            try {
              Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TG_BOT)/sendMessage" `
                -Method POST -ContentType "application/json" `
                -Body (@{chat_id=$env:TG_CHAT; text=$msg; parse_mode="HTML"} | ConvertTo-Json)
            } catch { Write-Host "TG notify failed: $_" }
          }
